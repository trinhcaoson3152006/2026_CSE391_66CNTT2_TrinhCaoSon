<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Promise Demo 2</title>
</head>

<body>

<h2>Demo Promise</h2>

<button id="btn">Bắt đầu</button>

<script>

function layDuLieu(){

return new Promise((resolve,reject)=>{

console.log("Đang xử lý...")

setTimeout(()=>{

let thanhCong = true

if(thanhCong){
resolve("Đã lấy dữ liệu thành công")
}else{
reject("Lấy dữ liệu thất bại")
}

},2000)

})

}

document.getElementById("btn").addEventListener("click",()=>{

layDuLieu()
.then(data=>{
console.log("Bước 1:",data)
return "Tiếp tục xử lý dữ liệu"
})
.then(data2=>{
console.log("Bước 2:",data2)
return "Hoàn thành xử lý"
})
.then(data3=>{
console.log("Bước 3:",data3)
})
.catch(err=>{
console.log("Có lỗi:",err)
})

})


function layDuLieuCallback(callback){

setTimeout(()=>{
callback("Dữ liệu từ callback")
},1000)

}

layDuLieuCallback(function(data){
console.log(data)
})


function layDuLieuPromise(){

return new Promise(resolve=>{

setTimeout(()=>{
resolve("Dữ liệu từ Promise")
},1000)

})

}

layDuLieuPromise().then(data=>{
console.log(data)
})

</script>

</body>

</html>
